<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aire Express - Tienda Online</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --success: #28a745;
            --success-hover: #218838;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --gray: #6c757d;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background-color: var(--white);
            box-shadow: 0 2px 10px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
        }

        .logo h1 {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        .cart-icon-container svg {
            width: 28px;
            height: 28px;
            fill: var(--dark);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--primary);
            color: var(--white);
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .hero {
            background: linear-gradient(135deg, #e0f2fe 0%, #007bff 100%);
            padding: 60px 20px;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(0, 0, 0, 0.7);
            margin-bottom: 0;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .catalog-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            padding-left: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 6px var(--shadow);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .btn-add {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background-color: var(--white);
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.3rem;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .item-details h4 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .item-details p {
            color: var(--primary);
            font-weight: bold;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-qty {
            background-color: #e9ecef;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-qty:hover {
            background-color: #dee2e6;
        }

        .item-qty {
            font-weight: 600;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            margin-left: 10px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            background-color: #fafafa;
        }

        .cart-totals {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-checkout {
            background-color: var(--success);
            color: var(--white);
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-checkout:hover {
            background-color: var(--success-hover);
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .cart-overlay.show {
            display: block;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 600;
            z-index: 99;
            transition: transform 0.2s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.05);
        }

        .online-badge {
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        @media (max-width: 480px) {
            .cart-drawer {
                max-width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1>Aire Express</h1>
            </div>
            <button class="cart-icon-container" id="cart-toggle" aria-label="Abrir Carrito">
                <svg viewBox="0 0 24 24">
                    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Especialistas en Climatización Profesional</h2>
            <p>Servicios de instalación, mantenimiento y reparación con atención inmediata directamente a tu hogar o negocio.</p>
        </div>
    </section>

    <main>
        <h3 class="catalog-title">Nuestros Productos y Servicios</h3>
        <div class="products-grid" id="catalog-container"></div>
    </main>

    <div class="cart-overlay" id="cart-overlay"></div>
    
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>Tu Carrito</h3>
            <button class="close-cart" id="cart-close">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-footer">
            <div class="cart-totals">
                <span>Total:</span>
                <span id="cart-total-amount">0 Bs.</span>
            </div>
            <button class="btn-checkout" id="checkout-btn">Finalizar Pedido por WhatsApp</button>
        </div>
    </div>

    <a href="https://wa.me/59162139098?text=Hola%20Aire%20Express,%20deseo%20solicitar%20información%20sobre%20sus%20servicios." class="whatsapp-float" target="_blank">
        <span class="online-badge"></span>
        <span>• Online</span>
    </a>

    <script>
        const products = [
            { id: 1, name: "Limpieza de Aires acondicionados", price: 150, image: "limpieza.png" },
            { id: 2, name: "Instalación de aires", price: 400, image: "https://static.wixstatic.com/media/d54c25_ae9f5db470be4fb4934afc342a8b4719~mv2.jpg/v1/fill/w_980,h_654,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AdobeStock_831131951_Preview.jpg" },
            { id: 3, name: "Carga de refrigerante", price: 350, image: "https://cl.habcdn.com/photos/project/medium/completando-carga-refrigerante-657349.jpg" },
            { id: 4, name: "Cambio de capacitor", price: 200, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQVxtBm3B5m8yZf9ZXXaGwMO0u96yXIkLPyQEkAdK-CjB9qo8Hv_cS57XY&s=10" },
            { id: 5, name: "Soldaduras de cobre en cañerías", price: 150, image: "https://co.coppergroupint.com/wp-content/uploads/2021/08/soldadura-de-cobre.jpg" }
        ];

        let cart = [];

        const catalogContainer = document.getElementById('catalog-container');
        const cartDrawer = document.getElementById('cart-drawer');
        const cartOverlay = document.getElementById('cart-overlay');
        const cartToggle = document.getElementById('cart-toggle');
        const cartClose = document.getElementById('cart-close');
        const cartItemsContainer = document.getElementById('cart-items-container');
        const cartCount = document.getElementById('cart-count');
        const cartTotalAmount = document.getElementById('cart-total-amount');
        const checkoutBtn = document.getElementById('checkout-btn');

        function init() {
            renderCatalog();
            setupEventListeners();
        }

        function renderCatalog() {
            catalogContainer.innerHTML = products.map(product => `
                <div class="product-card">
                    ${product.image ? `<img src="${product.image}" alt="${product.name}" class="product-image">` : ''}
                    <div class="product-info">
                        <div>
                            <h4 class="product-name">${product.name}</h4>
                        </div>
                        <div>
                            <p class="product-price">${product.price} Bs.</p>
                            <button class="btn-add" onclick="addToCart(${product.id})">Agregar al carrito</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            cartToggle.addEventListener('click', toggleCart);
            cartClose.addEventListener('click', toggleCart);
            cartOverlay.addEventListener('click', toggleCart);
            checkoutBtn.addEventListener('click', sendWhatsAppOrder);
        }

        function toggleCart() {
            cartDrawer.classList.toggle('open');
            cartOverlay.classList.toggle('show');
        }

        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }

            updateCart();
            if (!cartDrawer.classList.contains('open')) {
                toggleCart();
            }
        };

        window.updateQty = function(id, change) {
            const item = cart.find(item => item.id === id);
            if (!item) return;

            item.qty += change;
            if (item.qty <= 0) {
                cart = cart.filter(item => item.id !== id);
            }

            updateCart();
        };

        window.removeItem = function(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        };

        function updateCart() {
            const totalItems = cart.reduce((acc, item) => acc + item.qty, 0);
            const totalMoney = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            cartCount.textContent = totalItems;
            cartTotalAmount.textContent = `${totalMoney} Bs.`;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:var(--gray); margin-top:20px;">Tu carrito está vacío.</p>';
                return;
            }

            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>${item.price} Bs. x ${item.qty}</p>
                    </div>
                    <div class="item-controls">
                        <button class="btn-qty" onclick="updateQty(${item.id}, -1)">-</button>
                        <span class="item-qty">${item.qty}</span>
                        <button class="btn-qty" onclick="updateQty(${item.id}, 1)">+</button>
                        <button class="btn-remove" onclick="removeItem(${item.id})">
                            <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24">
                                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function sendWhatsAppOrder() {
            if (cart.length === 0) return;

            const phoneNumber = "59162139098";
            let message = "*NUEVO PEDIDO - AIRE EXPRESS*\n\n";
            message += "Detalle de la solicitud:\n";
            message += "=========================\n";

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                message += `• ${item.name}\n`;
                message += `  Cant: ${item.qty} x ${item.price} Bs. | Subtotal: ${subtotal} Bs.\n\n`;
            });

            const totalMoney = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            message += "=========================\n";
            message += `*TOTAL A PAGAR: ${totalMoney} Bs.*`;

            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${phoneNumber}?text=${encodedMessage}`, '_blank');
        }

        init();
    </script> <script src="https://catza-digital.github.io/catza-ai-widget/widget.js" data-client="cliente001"></script>
</body>
</html>
